name: Update Sony2 Playlist

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # STEP 1: CHECKOUT
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # STEP 2: CREATE FOLDER
      # --------------------------------------------------
      - name: Create folder
        run: mkdir -p sources

      # --------------------------------------------------
      # STEP 3: DOWNLOAD SOURCE
      # --------------------------------------------------
      - name: Download SONY2
        env:
          SRC_SONY2: ${{ secrets.SRC_SONY2 }}
        run: |
          wget -q -O sources/sony2.m3u "$SRC_SONY2" || echo "Download failed"

      # --------------------------------------------------
      # STEP 4: PROCESS PLAYLIST (FIXED)
      # --------------------------------------------------
      - name: Process playlist
        run: |
          sed '1d' sources/sony2.m3u \
          | awk '

          BEGIN {
            RS="#EXTINF"
            ORS=""

            # ==========================================
            # 🔥 EDIT THIS ONLY (BLOCK LIST)
            # ==========================================
            BLOCK_LIST = "aath|pix|sab|ten|marathi|set|bbc|pal|wah|max"
          }

          # ------------------------------
          # FUNCTION: CHECK BLOCK
          # ------------------------------
          function is_blocked(name) {
            name = tolower(name)
            return (name ~ "(" BLOCK_LIST ")")
          }

          # ------------------------------
          # FUNCTION: SET GROUP TITLE
          # ------------------------------
          function set_group(block, group) {
            if (block ~ /group-title="/) {
              gsub(/group-title="[^"]*"/, "group-title=\"" group "\"", block)
            } else {
              sub(/#EXTINF:-1/, "#EXTINF:-1 group-title=\"" group "\"", block)
            }
            return block
          }

          # ------------------------------
          # MAIN LOOP
          # ------------------------------
          NR > 1 {
            block = "#EXTINF" $0

            name = block
            sub(/.*?,/, "", name)

            if (!is_blocked(name)) {

              # --------------------------
              # GROUP TITLE FIX
              # --------------------------
              if (name ~ /Sony Max|Sony Pix/) {
                block = set_group(block, "Movies")
              }
              else if (name ~ /Sony SAB|Sony Pal|Sony Entertainment/) {
                block = set_group(block, "Entertainment")
              }
              else if (name ~ /Sony Yay/) {
                block = set_group(block, "Kids")
              }

              print block
            }
          }
          ' > sources/sony2.vxn

      # --------------------------------------------------
      # STEP 5: ADD HEADER
      # --------------------------------------------------
      - name: Add header
        run: |
          sed -i '1i #EXTM3U\n' sources/sony2.vxn

      # --------------------------------------------------
      # STEP 6: COMMIT
      # --------------------------------------------------
      - name: Commit playlist
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sources/sony2.vxn

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update SONY2 playlist"
            git push
          fi
