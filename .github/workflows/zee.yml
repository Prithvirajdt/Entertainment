name: Update Sony2 Playlist

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # STEP 1: CHECKOUT
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # STEP 2: CREATE FOLDER
      # --------------------------------------------------
      - name: Create folder
        run: mkdir -p sources

      # --------------------------------------------------
      # STEP 3: DOWNLOAD SOURCE
      # --------------------------------------------------
      - name: Download SONY2
        env:
          SRC_SONY2: ${{ secrets.SRC_SONY2 }}
        run: |
          wget -q -O sources/sony2.m3u "$SRC_SONY2" || echo "Download failed"

      # --------------------------------------------------
      # STEP 4: PROCESS PLAYLIST
      # --------------------------------------------------
      - name: Process playlist
        run: |
          sed '1d' sources/sony2.m3u \
          | awk '

          BEGIN {
            RS="#EXTINF"
            ORS=""

            # ==========================================
            # 🔥 EDIT THIS ONLY (BLOCK LIST)
            # Add any channel keywords here
            # ==========================================
            BLOCK_LIST = "aath|pix|sab|ten|kal|marathi|set|bbc|pal|wah|max"
          }

          # ------------------------------
          # FUNCTION: CHECK BLOCK
          # ------------------------------
          function is_blocked(name) {
            name = tolower(name)
            return (name ~ "\\b(" BLOCK_LIST ")\\b")
          }

          # ------------------------------
          # MAIN LOOP
          # ------------------------------
          NR > 1 {
            block = "#EXTINF" $0

            # Extract channel name
            name = block
            sub(/.*?,/, "", name)

            # ----------------------------------
            # FILTER USING BLOCK LIST
            # ----------------------------------
            if (!is_blocked(name)) {

              # ----------------------------------
              # GROUP TITLE FIX (EDITABLE)
              # ----------------------------------
              if (name ~ /Sony Max|Sony Pix/) {
                gsub(/group-title="[^"]*"/, "group-title=\"Movies\"", block)
              }
              else if (name ~ /Sony SAB|Sony Pal|Sony Entertainment/) {
                gsub(/group-title="[^"]*"/, "group-title=\"Entertainment\"", block)
              }
              else if (name ~ /Sony Yay/) {
                gsub(/group-title="[^"]*"/, "group-title=\"Kids\"", block)
              }

              # ----------------------------------
              # PRINT FINAL BLOCK
              # ----------------------------------
              print block
            }
          }
          ' > sources/sony.vxn

      # --------------------------------------------------
      # STEP 5: ADD HEADER
      # --------------------------------------------------
      - name: Add header
        run: |
          sed -i '1i #EXTM3U\n' sources/sony2.vxn

      # --------------------------------------------------
      # STEP 6: COMMIT
      # --------------------------------------------------
      - name: Commit playlist
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sources/sony.vxn

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update SONY2 playlist"
            git push
          fi
